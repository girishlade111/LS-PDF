name: Build & Sign Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Fetch OCR Binaries (Global Version Only)
        run: |
          mkdir -p public/tesseract
          curl -Lo public/tesseract/tesseract-core.wasm https://unpkg.com/tesseract.js-core@v5.1.1/tesseract-core.wasm
          curl -Lo public/tesseract/tesseract-core-simd.wasm https://unpkg.com/tesseract.js-core@v5.1.1/tesseract-core-simd.wasm
          curl -Lo public/tesseract/tesseract-core-lstm.wasm https://unpkg.com/tesseract.js-core@v5.1.1/tesseract-core-lstm.wasm
          curl -Lo public/tesseract/tesseract-core.wasm.js https://unpkg.com/tesseract.js-core@v5.1.1/tesseract-core.wasm.js
          curl -Lo public/tesseract/worker.min.js https://unpkg.com/tesseract.js@v5.1.1/dist/worker.min.js
          curl -Lo public/tesseract/eng.traineddata.gz https://raw.githubusercontent.com/naptha/tessdata/gh-pages/4.0.0/eng.traineddata.gz
          gunzip public/tesseract/eng.traineddata.gz

      - name: Build Web Assets (Global)
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-disabled: true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Global APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/app-release-unsigned.apk ../ls-pdf-global-unsigned.apk

      - name: Build F-Droid Lite APK (No OCR)
        run: |
          # Clean assets
          rm -rf public/tesseract/
          
          # Rebuild without OCR using environment variable
          export VITE_DISABLE_OCR=true
          npm run build
          npx cap sync android
          
          cd android
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/app-release-unsigned.apk ../ls-pdf-fdroid-unsigned.apk

      - name: Sign Both APKs
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.ANDROID_ALIAS }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "No signing key found — skipping APK signing"
            exit 0
          fi
          echo "$SIGNING_KEY" | base64 -d > keystore.jks
          SDK=$(find /usr/local/lib/android/sdk -name apksigner 2>/dev/null | head -1)
          if [ -z "$SDK" ]; then
            SDK=$(find $ANDROID_HOME $ANDROID_SDK_ROOT -name apksigner 2>/dev/null | head -1)
          fi
          if [ -z "$SDK" ]; then
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore keystore.jks \
              -storepass "$KEYSTORE_PASS" \
              -keypass "$KEY_PASS" \
              ls-pdf-global-unsigned.apk "$KEY_ALIAS"
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore keystore.jks \
              -storepass "$KEYSTORE_PASS" \
              -keypass "$KEY_PASS" \
              ls-pdf-fdroid-unsigned.apk "$KEY_ALIAS"
          else
            for apk in ls-pdf-global-unsigned.apk ls-pdf-fdroid-unsigned.apk; do
              "$SDK" sign --ks keystore.jks --ks-key-alias "$KEY_ALIAS" \
                --ks-pass "pass:$KEYSTORE_PASS" --key-pass "pass:$KEY_PASS" "$apk"
            done
          fi
          rm -f keystore.jks
          echo "APKs signed successfully"

      - name: Rename & Prepare Artifacts
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp ls-pdf-global-unsigned.apk "ls-pdf-v${VERSION}.apk"
          cp ls-pdf-fdroid-unsigned.apk "ls-pdf-lite-v${VERSION}.apk"
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LS-PDF-v${{ env.APP_VERSION }}
          path: |
            ls-pdf-v${{ env.APP_VERSION }}.apk
            ls-pdf-lite-v${{ env.APP_VERSION }}.apk

          if-no-files-found: error
